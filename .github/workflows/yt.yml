name: Download YouTube Videos via Invidious (No Cookies)
on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'YouTube channel URL'
        required: true
      invidious_instance:
        description: 'Invidious instance (e.g., https://invidious.example.com)'
        required: true
jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install yt-dlp
        run: pip install yt-dlp
      - name: Download 5 latest videos
        run: |
          yt-dlp --ies invidious \
                 --extractor-args "invidious:instance=${{ github.event.inputs.invidious_instance }}" \
                 --no-playlist \
                 --playlist-end 5 \
                 --format "bestvideo[height<=360][ext=mp4]+bestaudio[ext=m4a]/best[height<=360][ext=mp4]" \
                 -o "downloads/%(title)s.%(ext)s" \
                 "${{ github.event.inputs.channel_url }}"
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add videos from channel"
